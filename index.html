<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>公益证书生成</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <div class="form-box" id="formBox">
      <h1>公益证书生成</h1>
      <p>请输入姓名后生成证书</p>
      <input type="text" id="nameInput" placeholder="请输入姓名" />
      <button id="generateBtn">生成证书</button>
    </div>

    <div class="certificate-wrapper hidden" id="certificateWrapper">
      <div class="certificate" id="certificate">
        <img src="certificate.png" alt="证书底图" class="bg" />

        <div class="donor-name" id="donorName"></div>
        <div class="year" id="yearText"></div>
        <div class="month" id="monthText"></div>
        <div class="day" id="dayText"></div>
      </div>

      <div class="action-bar">
        <button id="backBtn">返回修改</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
