<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>公益证书生成</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <!-- 输入表单 -->
    <div class="form-box" id="formBox">
      <h1>公益证书生成</h1>
      <p>请输入姓名后生成证书</p>
      <input type="text" id="nameInput" placeholder="请输入姓名" maxlength="20" />
      <button id="generateBtn">生成证书</button>
    </div>

    <!-- 证书区域 -->
    <div class="certificate-wrapper hidden" id="certificateWrapper">
      <div class="certificate" id="certificate">
        <div class="donor-name" id="donorName"></div>
        <div class="year"><span id="yearText"></span>年</div>
        <div class="month"><span id="monthText"></span>月</div>
        <div class="day"><span id="dayText"></span>日</div>
      </div>

      <div class="action-bar">
        <button id="downloadBtn">下载证书</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
